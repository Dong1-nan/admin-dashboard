name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        working-directory: apps/server
        run: npm install

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install

      - name: Setup backend
        working-directory: apps/server
        run: |
          npx prisma generate
          npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test123@localhost:5432/test_db

      - name: Run backend tests
        working-directory: apps/server
        run: npm run test
        env:
          DATABASE_URL: postgresql://test:test123@localhost:5432/test_db
          JWT_SECRET: test-secret-key-for-ci

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/server
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/admin-server:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/admin-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/admin-web:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/admin-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/admin-dashboard
            
            # 拉取最新镜像
            docker compose -f docker-compose.prod.yml pull
            
            # 停止旧容器
            docker compose -f docker-compose.prod.yml down
            
            # 启动新容器
            docker compose -f docker-compose.prod.yml up -d
            
            # 清理旧镜像
            docker image prune -af
            
            # 检查服务状态
            docker compose -f docker-compose.prod.yml ps