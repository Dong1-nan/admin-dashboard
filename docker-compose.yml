services:
  postgres:
    image: postgres:16-alpine
    container_name: admin-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: admin-server
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/dashboard?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-min-32-characters
      JWT_EXPIRES_IN: 24h
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/server/src:/app/src:ro
      - ./apps/server/prisma:/app/prisma:ro

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: admin-web
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data: